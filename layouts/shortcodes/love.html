<style>
.chat-container {
    max-width: 500px; 
    margin: 30px auto;
    padding: 20px;
    background-color: #f3f3f3; 
    border-radius: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}
.chat-row { display: flex; margin-bottom: 20px; align-items: flex-start; }
.chat-row.left { justify-content: flex-start; }
.chat-row.right { justify-content: flex-end; }
.avatar { font-size: 32px; margin: 0 8px; line-height: 1; user-select: none; }
.message-group { display: flex; flex-direction: column; gap: 4px; max-width: 70%; }
.left .message-group { align-items: flex-start; }
.right .message-group { align-items: flex-end; }
.bubble {
    padding: 10px 14px; font-size: 15px; line-height: 1.4; word-wrap: break-word;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05); border-radius: 18px; 
}
.left .bubble { background-color: #ffffff; color: #333; }
.left .message-group .bubble:first-child { border-top-left-radius: 4px; }
.right .bubble { background-color: #007aff; color: #ffffff; }
.right .message-group .bubble:first-child { border-top-right-radius: 4px; }
.trigger-bubble {
    cursor: pointer; background-color: #ff2d55 !important; color: white !important;
    font-weight: bold; animation: pulse 2s infinite; transition: transform 0.1s;
}
.trigger-bubble:active { transform: scale(0.95); }
@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(255, 45, 85, 0.4); }
    70% { box-shadow: 0 0 0 10px rgba(255, 45, 85, 0); }
    100% { box-shadow: 0 0 0 0 rgba(255, 45, 85, 0); }
}

#loveOverlay {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: #000; z-index: 999999; display: none; flex-direction: column;
    justify-content: center; align-items: center; opacity: 0; transition: opacity 1s ease;
}
#typing {
    color: #ff7aa2; font-size: clamp(18px, 4vw, 26px); line-height: 2;
    text-shadow: 0 0 10px #ff4d88, 0 0 20px #ff2d75; text-align: center;
    padding: 0 20px; z-index: 10; width: 100%; box-sizing: border-box;
}
#heartCanvas {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    opacity: 0; transition: opacity 2s ease; z-index: 1;
}
.timer-text { font-size: clamp(16px, 3vw, 20px); color: #ffb3c6; margin-top: 10px; font-weight: 300; }
.timer-text b { font-size: clamp(20px, 4vw, 24px); color: #fff; text-shadow: 0 0 8px #ff4d88; }
</style>

<script>
const lines = [
    "正在连接心跳系统...",
    "加载情感模块...",
    "识别唯一变量：豆老师 (Dollya) ❤️",
    "检索记忆数据库：2003年农历九月十四，那是奇迹诞生的日子。",
    "而 5月11日，是我们的开始。",
    "",
    "我想写一段代码，",
    "只为妳一个人运行。",
    "",
    "编译完成。"
];

let lineIdx = 0; let charIdx = 0;
let typing = document.getElementById("typing");
let timerInterval;

function typeChar() {
    if (lineIdx < lines.length) {
        let currentLine = lines[lineIdx];
        if (charIdx < currentLine.length) {
            typing.innerHTML += currentLine.charAt(charIdx);
            charIdx++;
            setTimeout(typeChar, 100);
        } else {
            typing.innerHTML += "<br>";
            lineIdx++; charIdx = 0;
            setTimeout(typeChar, 600);
        }
    } else {
        setTimeout(showHeart, 1000);
    }
}

/* ===== 核心算法升级：5万粒子级 3D 纵深心跳 ===== */
const canvas = document.getElementById("heartCanvas");
const ctx = canvas.getContext("2d");
let particles = [];
let animationFrameId;

function getHeartPoint(t, scale) {
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
    return { x: x * scale, y: y * scale };
}

function initHeart() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    ctx.scale(dpr, dpr);
    
    particles = [];
    const scale = window.innerWidth < 768 ? 9 : 14; 
    const isMobile = window.innerWidth < 768;
    
    let count1 = isMobile ? 12000 : 20000;
    for (let i = 0; i < count1; i++) {
        let t = Math.random() * Math.PI * 2;
        let p = getHeartPoint(t, scale);
        let ratio = Math.pow(Math.random(), 0.6); 
        particles.push({ 
            ox: p.x * ratio, oy: p.y * ratio, 
            size: Math.random() * 1.5 + 0.5, 
            color: '#aa0022', 
            force: 0.5 + ratio * 0.4 
        });
    }

    let count2 = isMobile ? 15000 : 30000;
    for (let i = 0; i < count2; i++) {
        let t = Math.random() * Math.PI * 2;
        let p = getHeartPoint(t, scale);
        let rx = -0.06 * Math.log(Math.random());
        let ry = -0.06 * Math.log(Math.random());
        particles.push({ 
            ox: p.x * (1 - rx), oy: p.y * (1 - ry), 
            size: Math.random() * 2 + 0.5, 
            color: '#ff2d55', 
            force: 1.0 
        });
    }

    let count3 = isMobile ? 5000 : 10000;
    for (let i = 0; i < count3; i++) {
        let t = Math.random() * Math.PI * 2;
        let p = getHeartPoint(t, scale);
        let ratio = Math.random() * 0.7 + 0.3; 
        particles.push({ 
            ox: p.x * ratio, oy: p.y * ratio, 
            size: Math.random() * 1.8 + 0.5, 
            color: '#ff7aa2', 
            force: 0.8 + ratio * 0.3
        });
    }

    let count4 = isMobile ? 3000 : 6000;
    for (let i = 0; i < count4; i++) {
        let t = Math.random() * Math.PI * 2;
        let p = getHeartPoint(t, scale);
        let rx = -0.15 * Math.log(Math.random());
        let ry = -0.15 * Math.log(Math.random());
        let dx = Math.random() > 0.5 ? 1 : -1;
        let dy = Math.random() > 0.5 ? 1 : -1;
        particles.push({ 
            ox: p.x * (1 + rx * dx), oy: p.y * (1 + ry * dy), 
            size: Math.random() * 1.2 + 0.3, 
            color: '#ff4d88', 
            force: 1.2 + Math.random() * 0.3 
        });
    }
}

function drawHeart() {
    const dpr = window.devicePixelRatio || 1;
    
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, canvas.width / dpr, canvas.height / dpr);
    
    ctx.save();
    // 🌟 将爱心整体向下偏移 40px，为顶部文字腾出空间
    ctx.translate(window.innerWidth / 2, window.innerHeight / 2 + 40); 
    
    let t = (Date.now() % 1000) / 1000; 
    let curve = Math.sin(t * Math.PI) * Math.exp(-t * 2.5); 

    particles.forEach(p => {
        let beatScale = 1 + 0.12 * curve * p.force; 
        let curX = p.ox * beatScale + (Math.random() - 0.5) * 1.5;
        let curY = p.oy * beatScale + (Math.random() - 0.5) * 1.5;

        ctx.fillStyle = p.color;
        ctx.fillRect(curX, curY, p.size, p.size);
    });

    ctx.restore();
    animationFrameId = requestAnimationFrame(drawHeart);
}

const startDate = new Date("2026-05-11T00:00:00").getTime(); 

function updateTimer() {
    const now = new Date().getTime();
    const diff = now - startDate;

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);

    const timerEl = document.getElementById("timeCounter");
    if(timerEl) {
        timerEl.innerHTML = `我们已经相爱了<br><b>${days}</b> 天 <b>${hours}</b> 小时 <b>${minutes}</b> 分钟 <b>${seconds}</b> 秒`;
    }
}

function showHeart() {
    typing.style.opacity = 0; 

    setTimeout(() => {
        canvas.style.opacity = 1; 
        initHeart();
        drawHeart();

        // 🌟 将文案固定在屏幕上方，退出按钮固定在底部
        typing.innerHTML = `
            <div style="
                position: fixed;
                top: 12vh;
                left: 0;
                width: 100%;
                color: #ff2d55;
                font-size: clamp(32px, 6vw, 42px);
                text-shadow: 0 0 10px #ff4d88, 0 0 30px #ff2d75;
                text-align: center;
                z-index: 20;
            ">
                ❤️ 豆老师 (Dollya) ❤️<br>
                <div id="timeCounter" class="timer-text"></div>
            </div>
            <div id="closeBtn" style="
                position: fixed;
                bottom: 8vh;
                left: 0;
                width: 100%;
                text-align: center;
                font-size: 14px;
                color: #888;
                text-decoration: underline;
                cursor: pointer;
                z-index: 20;
            ">退出心跳系统</div>
        `;
        typing.style.opacity = 1; 
        
        updateTimer();
        timerInterval = setInterval(updateTimer, 1000);
        document.getElementById("closeBtn").addEventListener('click', closeOverlay);

    }, 1000);
}

const triggerBtn = document.getElementById('loveTriggerBtn');
const overlay = document.getElementById('loveOverlay');

triggerBtn.addEventListener('click', function(e) {
    e.preventDefault();
    document.body.style.overflow = 'hidden'; 
    overlay.style.display = 'flex';
    
    setTimeout(() => {
        overlay.style.opacity = 1;
        typing.innerHTML = "";
        lineIdx = 0; charIdx = 0;
        typeChar();
    }, 50);
});

function closeOverlay() {
    overlay.style.opacity = 0;
    setTimeout(() => {
        overlay.style.display = 'none';
        document.body.style.overflow = ''; 
        cancelAnimationFrame(animationFrameId);
        clearInterval(timerInterval);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }, 1000);
}

window.addEventListener('resize', () => {
    if (overlay.style.display === 'flex') { initHeart(); }
});
</script>
