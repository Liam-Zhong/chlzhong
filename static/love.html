<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>要娶豆老师！</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            background-color: #000; overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; 
        }
        
        #heartCanvas { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            opacity: 0; transition: opacity 2s ease-in-out; z-index: 1; 
        }
        
        .timer-text { 
            font-size: clamp(15px, 3vw, 18px); color: #cc0000; 
            margin-top: 12px; font-weight: 300; letter-spacing: 1px;
        }
        
        .timer-text b { 
            font-size: clamp(20px, 4vw, 24px); color: #ff1a1a; 
            text-shadow: 0 0 10px #aa0000; font-weight: 400;
        }
        
        #finalContent { 
            position: fixed; top: 10vh; left: 0; width: 100%; 
            color: #ff0000; font-size: clamp(28px, 5vw, 36px); 
            text-shadow: 0 0 15px rgba(204, 0, 0, 0.8); 
            text-align: center; z-index: 20; letter-spacing: 2px;
            opacity: 0; transition: opacity 2s ease-in-out; pointer-events: none; 
        }
    </style>
</head>
<body>
    <div id="finalContent">
        ❤️ 豆老师 (Dollya) ❤️<br>
        <div id="timeCounter" class="timer-text"></div>
    </div>
    <canvas id="heartCanvas"></canvas>

<script>
const finalContent = document.getElementById("finalContent");
let timerInterval;

const canvas = document.getElementById("heartCanvas");
const ctx = canvas.getContext("2d");
let particles = []; 
let animationFrameId;

function getWordParticles(text, scale) {
    const offCanvas = document.createElement('canvas');
    const offCtx = offCanvas.getContext('2d');
    const size = 120; 
    offCanvas.width = size; offCanvas.height = size;
    
    offCtx.font = "bold 90px 'PingFang SC', sans-serif";
    offCtx.textAlign = "center";
    offCtx.textBaseline = "middle";
    offCtx.fillStyle = "white";
    offCtx.fillText(text, size/2, size/2);
    
    const imgData = offCtx.getImageData(0, 0, size, size).data;
    const points = [];
    
    for(let y = 0; y < size; y += 2) {
        for(let x = 0; x < size; x += 2) {
            if(imgData[(y * size + x) * 4 + 3] > 128) {
                points.push({ x: (x - size/2) * scale, y: (y - size/2) * scale });
            }
        }
    }
    return points;
}

function getHeartPoint(t, scale) {
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
    return { x: x * scale, y: y * scale, t: t }; 
}

function initHeart() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr; 
    canvas.height = window.innerHeight * dpr; 
    ctx.scale(dpr, dpr);
    
    particles = [];
    const scale = window.innerWidth < 768 ? 9 : 14; 
    const isMobile = window.innerWidth < 768;
    
    const wordScale = isMobile ? 1.0 : 1.3;
    const wordPts = getWordParticles('豆', wordScale);
    
    wordPts.forEach(pt => {
        particles.push({
            ox: pt.x, oy: pt.y,
            size: 1.5, 
            color: '#ff1a1a', 
            force: 0.1,
            z: 1.0, // 3D深度：最前端
            isEmber: false
        });
    });

    let count = isMobile ? 30000 : 50000; 
    for (let i = 0; i < count; i++) { 
        let p = getHeartPoint(Math.random() * Math.PI * 2, scale); 
        
        let distToBottom = Math.abs(p.t - Math.PI);
        let distToTop = Math.min(p.t, Math.PI * 2 - p.t);
        let fadeZone = 0.5; 
        if (distToBottom < fadeZone && Math.random() < Math.pow(1 - (distToBottom / fadeZone), 2) * 0.95) continue; 
        if (distToTop < fadeZone && Math.random() < Math.pow(1 - (distToTop / fadeZone), 2) * 0.95) continue; 

        let rx = -0.06 * Math.log(Math.random()); 
        let ry = -0.06 * Math.log(Math.random()); 
        let zDepth = Math.random() * 0.8 + 0.1;
        let color = '#ff0000'; 
        if (zDepth < 0.4) color = '#550000'; // 底部阴影
        else if (zDepth < 0.7) color = '#aa0000'; // 中层血色

        particles.push({ 
            ox: p.x * (1 - rx), oy: p.y * (1 - ry), 
            size: Math.random() * 1.5 + 0.5, 
            color: color, 
            force: 1.0,
            z: zDepth,
            isEmber: false
        }); 
    }

    let emberCount = isMobile ? 2500 : 4000;
    for (let i = 0; i < emberCount; i++) {
        let p = getHeartPoint(Math.random() * Math.PI * 2, scale);
        let scatter = Math.random() * 1.5 + 0.5; 
        
        particles.push({
            ox: p.x * scatter, oy: p.y * scatter,
            size: Math.random() * 2 + 0.5,
            color: 'rgba(255, 30, 30, 0.7)', 
            force: 1.2,
            z: Math.random(), 
            isEmber: true,
            orbitAngle: Math.random() * Math.PI * 2,
            orbitSpeed: (Math.random() - 0.5) * 0.04,
            orbitRadius: Math.random() * 15 + 5
        });
    }
}

function drawHeart() {
    const dpr = window.devicePixelRatio || 1;
    
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)'; 
    ctx.fillRect(0, 0, canvas.width / dpr, canvas.height / dpr);
    
    ctx.save(); 
    ctx.translate(window.innerWidth / 2, window.innerHeight / 2 + 50); 
    
    let t = (Date.now() % 1000) / 1000; 
    let curve = Math.sin(t * Math.PI) * Math.exp(-t * 2.2); 
    
    ctx.globalCompositeOperation = 'lighter';

    particles.forEach(p => {
        let curX = p.ox;
        let curY = p.oy;
        
        if (p.isEmber) {
            p.orbitAngle += p.orbitSpeed;
            curX += Math.cos(p.orbitAngle) * p.orbitRadius;
            curY += Math.sin(p.orbitAngle) * p.orbitRadius;
        }

        let beatScale = 1 + 0.1 * curve * p.force; 
        let bulge3D = 1 + p.z * 0.12 * curve; 

        ctx.fillStyle = p.color;

        ctx.fillRect(curX * beatScale * bulge3D, curY * beatScale * bulge3D, p.size, p.size);
    });
    
    ctx.restore(); 
    animationFrameId = requestAnimationFrame(drawHeart);
}

const startDate = new Date("2026-05-11T00:00:00").getTime(); 

function updateTimer() {
    const diff = new Date().getTime() - startDate;
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);
    const timerEl = document.getElementById("timeCounter");
    if(timerEl) timerEl.innerHTML = `我们已经相爱了<br><b>${days}</b> 天 <b>${hours}</b> 小时 <b>${minutes}</b> 分钟 <b>${seconds}</b> 秒`;
}

function showHeart() {
    initHeart(); 
    drawHeart(); 
    updateTimer(); 
    timerInterval = setInterval(updateTimer, 1000);
    
    setTimeout(() => {
        canvas.style.opacity = 1; 
        finalContent.style.opacity = 1;
    }, 100);
}

window.addEventListener('resize', () => { 
    if (canvas.style.opacity == 1) initHeart(); 
});

window.onload = () => { 
    showHeart(); 
};
</script>
</body>
</html>
